<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>shelly</title>
    <style>
        body {
            background-color: black;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }
        #value {
            color: white;
            font-size: 60px;
            font-weight: 600;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>

    <div id="value">0</div>
    <canvas id="gauge" width="450" height="260"></canvas>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const socket = io();

        const min = -1000;
        const max = 3000;

        const canvas = document.getElementById("gauge");
        const ctx = canvas.getContext("2d");

        const cx = canvas.width / 2;
        const cy = canvas.height * 0.92;
        const radius = 170;

        let currentValue = 0;
        let displayValue = 0;

        // ASYMMETRISCHE SKALA
        function valueToAngle(value) {
            if (value <= 0) {
                const t = (value - min) / (0 - min);
                return Math.PI - t * (Math.PI * 0.25);  // 180° → 135°
            } else {
                const t = value / max;
                return Math.PI * 0.75 - t * (Math.PI * 0.75); // 135° → 0°
            }
        }

        function drawGauge(value) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Hintergrundbogen
            ctx.lineWidth = 25;
            ctx.strokeStyle = "#222";
            ctx.beginPath();
            ctx.arc(cx, cy, radius, Math.PI, 0, false);
            ctx.stroke();

            // ÄUSSERER FARBVERLAUF (wie bisher)
            const gradOuter = ctx.createLinearGradient(cx - radius, cy, cx + radius, cy);
            gradOuter.addColorStop(0, "#00ff66");
            gradOuter.addColorStop(0.5, "#ffff33");
            gradOuter.addColorStop(1, "#ff3333");

            const angle = valueToAngle(value);

            // ÄUSSERER WERTBOGEN
            ctx.strokeStyle = gradOuter;
            ctx.lineWidth = 25;
            ctx.beginPath();
            ctx.arc(cx, cy, radius, Math.PI, angle, true);
            ctx.stroke();

            // *** INNERER FARB-RING ***
            const innerRadius = radius - 35;

            // Dynamische Farbe: 0 = Grün, 3000 = Dunkelrot
            const t = Math.max(0, Math.min(1, value / max));
            const r = Math.floor(0 + t * 180);
            const g = Math.floor(255 - t * 255);
            const b = Math.floor(0 + t * 50);
            const dynamicColor = `rgb(${r},${g},${b})`;

            ctx.strokeStyle = dynamicColor;
            ctx.lineWidth = 12;
            ctx.beginPath();
            ctx.arc(cx, cy, innerRadius, Math.PI, angle, true);
            ctx.stroke();

            // Ticks
            ctx.lineWidth = 3;
            ctx.strokeStyle = "white";

            const tickValues = [-1000, 0, 3000];

            for (const v of tickValues) {
                const a = valueToAngle(v);

                const x1 = cx + Math.cos(a) * (radius - 15);
                const y1 = cy - Math.sin(a) * (radius - 15);
                const x2 = cx + Math.cos(a) * (radius + 15);
                const y2 = cy - Math.sin(a) * (radius + 15);

                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }

            // Labels
            ctx.fillStyle = "white";
            ctx.font = "18px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            const labels = [
                { v: -1000, label: "-1000" },
                { v: 0, label: "0" },
                { v: 3000, label: "3000" }
            ];

            for (const m of labels) {
                const a = valueToAngle(m.v);
                const lx = cx + Math.cos(a) * (radius + 40);
                const ly = cy - Math.sin(a) * (radius + 40);
                ctx.fillText(m.label, lx, ly);
            }

            // Zeiger
            const pa = valueToAngle(value);
            const px = cx + Math.cos(pa) * (radius - 40);
            const py = cy - Math.sin(pa) * (radius - 40);

            ctx.shadowColor = "rgba(255,0,0,0.7)";
            ctx.shadowBlur = 20;

            ctx.strokeStyle = "red";
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(px, py);
            ctx.stroke();

            ctx.shadowBlur = 0;

            // Mittelpunkt
            ctx.fillStyle = "red";
            ctx.beginPath();
            ctx.arc(cx, cy, 8, 0, Math.PI * 2);
            ctx.fill();
        }

        function animate() {
            displayValue += (currentValue - displayValue) * 0.1;
            drawGauge(displayValue);
            requestAnimationFrame(animate);
        }

        animate();

        socket.on("update", (data) => {
            currentValue = Number(data);
            document.getElementById("value").textContent = currentValue;
        });
    </script>

</body>
</html>
